<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="SF3BPIC_5T9BjlDK2RXa2Z5ksI0ySOU5Xv2K7F9DE7Y" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LLM Compass">
<meta name="theme-color" content="#f7f5f0">
<meta property="og:title" content="LLM Compass — 海外LLM项目匹配器">
<meta property="og:description" content="中国法学生海外LLM项目智能匹配工具，覆盖美英港新澳加34个顶尖项目">
<meta property="og:type" content="website">
<title>LLM Compass — 海外LLM项目匹配器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--fs:15px;--r:12px;--brand:#7c6f5a;--brand-dark:#4a3e2e;--brand-light:#f0ece3;--bg:#f7f5f0;--card:#fff;--border:#e0ddd6;--text:#1a1916;--muted:#9a9588;--muted2:#b8b0a0;--danger:#904820;--success:#4a7030;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:var(--fs);overscroll-behavior:none;}

/* ── LAYOUT ── */
.app{padding:1rem 1rem 6rem;width:100%;max-width:640px;margin:0 auto;}
@media(min-width:640px){.app{padding:2rem 2rem 5rem;}}

/* ── NAV ── */
.top-nav{display:flex;gap:8px;margin-bottom:1.25rem;}
.tnav-btn{flex:1;padding:12px 8px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;}
.tnav-btn.on{border-color:var(--brand);background:var(--brand-light);color:var(--text);}

/* ── TIER GUIDE ── */
.tier-guide{display:none;}.tier-guide.on{display:block;}
.tg-title{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px;}
.tg-sub{font-size:13px;color:var(--muted);margin-bottom:1.1rem;}
.ctabs{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:1.1rem;padding-bottom:4px;scrollbar-width:none;}
.ctabs::-webkit-scrollbar{display:none;}
.ctab{font-size:13px;padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.ctab.on{background:var(--brand-light);border-color:var(--brand);color:var(--text);font-weight:500;}
.country-panel{display:none;}.country-panel.on{display:block;}
.tier-card{background:var(--card);border:2px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:10px;}
.tier-head{padding:12px 14px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tier-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;flex-shrink:0;}
.tb1{background:#1a1916;color:#f7f5f0;}.tb2{background:#4a3e2e;color:#f7f5f0;}.tb3{background:#7c6f5a;color:#fff;}.tb4{background:#b8b0a0;color:#fff;}
.tier-label{font-family:'DM Serif Display',serif;font-size:15px;flex:1;}
.tier-reach{font-size:11px;color:var(--muted2);}
.tier-schools{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:5px;}
.stag{font-size:12px;padding:3px 9px;border-radius:99px;border:1.5px solid #c8b898;color:var(--brand-dark);background:#fdf8f0;}
.tier-note{padding:9px 14px 11px;font-size:12px;color:var(--muted);line-height:1.65;border-top:1px solid #f0ede6;}

/* ── MATCHER ── */
.matcher{display:none;}.matcher.on{display:block;}
.prog-wrap{margin-bottom:1.25rem;}
.prog-label{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.prog-track{height:3px;background:var(--border);border-radius:2px;}
.prog-fill{height:100%;background:var(--brand);border-radius:2px;transition:width .5s ease;}
.step-num{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.step-q{font-family:'DM Serif Display',serif;font-size:clamp(20px,6vw,28px);line-height:1.25;margin-bottom:5px;}
.step-q em{font-style:italic;color:var(--brand);}
.step-hint{font-size:13px;color:var(--muted);margin-bottom:1.1rem;line-height:1.55;}

/* Options */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:1.1rem;}
.opt{display:flex;align-items:center;gap:12px;padding:14px 15px;border:2px solid var(--border);border-radius:11px;cursor:pointer;background:var(--card);text-align:left;width:100%;color:inherit;transition:all .15s;position:relative;min-height:58px;}
.opt:active{background:#f5f3ee;}.opt.sel{border-color:var(--brand);background:var(--brand-light);box-shadow:0 0 0 3px #7c6f5a22;}
.opt.sel::after{content:'✓';position:absolute;right:12px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:var(--brand);color:#fff;border-radius:50%;font-size:10px;font-weight:700;line-height:22px;text-align:center;}
.opt-icon{font-size:20px;flex-shrink:0;width:26px;text-align:center;}
.opt-text{flex:1;padding-right:28px;}
.opt-main{font-size:14px;font-weight:500;display:block;line-height:1.35;}
.opt-sub{font-size:12px;color:var(--muted);margin-top:2px;display:block;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.1rem;}
.opt-pill{padding:12px 12px;border:2px solid var(--border);border-radius:9px;cursor:pointer;font-size:13px;color:var(--muted);background:var(--card);text-align:left;transition:all .15s;width:100%;font-family:'DM Sans',sans-serif;position:relative;min-height:52px;}
.opt-pill:active{background:#f5f3ee;}.opt-pill.sel{border-color:var(--brand);color:var(--text);background:var(--brand-light);font-weight:500;}
.opt-pill.sel::after{content:'✓';position:absolute;right:8px;top:8px;width:17px;height:17px;background:var(--brand);color:#fff;border-radius:50%;font-size:8px;font-weight:700;line-height:17px;text-align:center;}
.opt-pill-en{display:block;font-size:11px;color:var(--muted2);margin-top:2px;}

/* Work card */
.wcard{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:15px;margin-bottom:1.1rem;}
.wsec{margin-bottom:12px;}
.wlbl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:block;}
.yrs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.yr-pill{padding:11px 4px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);background:var(--card);text-align:center;transition:all .15s;width:100%;font-family:'DM Sans',sans-serif;}
.yr-pill:active{background:#f5f3ee;}.yr-pill.sel{border-color:var(--brand);color:var(--text);background:var(--brand-light);}
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ind-pill{padding:11px 11px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);background:var(--card);text-align:left;transition:all .15s;width:100%;font-family:'DM Sans',sans-serif;position:relative;line-height:1.35;}
.ind-pill:active{background:#f5f3ee;}.ind-pill.sel{border-color:var(--brand);color:var(--text);background:var(--brand-light);font-weight:500;}
.ind-pill.sel::after{content:'✓';position:absolute;right:7px;top:7px;width:14px;height:14px;background:var(--brand);color:#fff;border-radius:50%;font-size:7px;font-weight:700;line-height:14px;text-align:center;}
.work-insight{background:var(--brand-light);border:1.5px solid #c8b898;border-radius:9px;padding:11px 13px;margin-bottom:1.1rem;font-size:13px;color:var(--brand-dark);line-height:1.65;}
.wi-title{font-weight:500;font-size:11px;color:#7c6058;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.ws-tag{display:inline-block;font-size:12px;background:#fff;color:var(--brand-dark);border-radius:99px;padding:3px 10px;margin:2px 3px 2px 0;border:1px solid #c8b898;}

/* Spec */
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1.1rem;}
@media(min-width:480px){.spec-grid{grid-template-columns:1fr 1fr 1fr;}}
.spec-pill{padding:11px 10px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);background:var(--card);text-align:left;transition:all .15s;width:100%;font-family:'DM Sans',sans-serif;position:relative;line-height:1.35;}
.spec-pill:active{background:#f5f3ee;}.spec-pill.sel{border-color:var(--brand);color:var(--text);background:var(--brand-light);font-weight:500;}
.spec-pill.sel::after{content:'✓';position:absolute;right:6px;top:6px;width:14px;height:14px;background:var(--brand);color:#fff;border-radius:50%;font-size:7px;font-weight:700;line-height:14px;text-align:center;}
.spec-pill-en{display:block;font-size:10px;color:var(--muted2);margin-top:2px;}
.spec-new{font-size:9px;background:#e8f4e8;color:#2a6a2a;border-radius:3px;padding:1px 4px;margin-left:3px;vertical-align:middle;}
.spec-hint-box{background:var(--card);border:1.5px solid #c8b898;border-radius:9px;padding:11px 13px;margin-bottom:1.1rem;}
.sht{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.sh-tag{display:inline-block;font-size:12px;background:var(--brand-light);color:var(--brand-dark);border-radius:99px;padding:3px 10px;margin:2px 3px 2px 0;}

/* Slider */
.slider-wrap{margin-bottom:1.1rem;}
.budget-val{font-family:'DM Serif Display',serif;font-size:30px;color:var(--brand);margin-bottom:6px;}
.budget-usd{font-size:12px;color:var(--muted2);margin-bottom:12px;}
input[type=range].custom{-webkit-appearance:none;width:100%;height:4px;background:linear-gradient(to right,var(--brand) var(--pct,40%),var(--border) var(--pct,40%));border-radius:2px;outline:none;cursor:pointer;}
input[type=range].custom::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;background:var(--brand);border-radius:50%;cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--brand);}
.slider-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted2);margin-top:6px;}

/* School */
.school-search{width:100%;background:var(--card);border:2px solid var(--border);border-radius:9px;padding:13px 14px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;margin-bottom:10px;}
.school-search:focus{border-color:var(--brand);}
.school-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1.1rem;max-height:320px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.school-pill{padding:10px 11px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);background:var(--card);text-align:left;transition:all .15s;width:100%;font-family:'DM Sans',sans-serif;position:relative;}
.school-pill:active{background:#f5f3ee;}.school-pill.sel{border-color:var(--brand);color:var(--text);background:var(--brand-light);font-weight:500;}
.school-pill.sel::after{content:'✓';position:absolute;right:8px;top:50%;transform:translateY(-50%);width:15px;height:15px;background:var(--brand);color:#fff;border-radius:50%;font-size:8px;font-weight:700;line-height:15px;text-align:center;}
.school-tier-label{font-size:10px;color:var(--muted2);display:block;margin-top:2px;}

/* Lang */
.lang-wrap{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:15px;margin-bottom:1.1rem;}
.lang-tabs{display:flex;gap:7px;margin-bottom:12px;}
.lang-tab{flex:1;padding:11px 6px;border:2px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;text-align:center;}
.lang-tab.sel{border-color:var(--brand);background:var(--brand-light);color:var(--brand-dark);}
.score-val{font-family:'DM Serif Display',serif;font-size:28px;color:var(--brand);margin-bottom:10px;}
.score-range-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted2);margin-top:6px;}
.lang-elig{margin-top:12px;padding:10px 12px;background:var(--bg);border-radius:8px;}
.lang-elig-title{font-weight:500;font-size:13px;margin-bottom:5px;}
.elig-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.es{font-size:12px;color:var(--muted);}.eg{font-size:12px;color:var(--success);}.ew{font-size:12px;color:var(--danger);}.en{font-size:12px;color:var(--muted2);}
.toefl-note{font-size:12px;color:var(--danger);background:#fdf0e4;border:1px solid #e0c0a0;border-radius:6px;padding:7px 11px;margin-top:9px;}

/* Nav buttons */
.nav{display:flex;gap:10px;align-items:center;margin-top:1.1rem;}
.btn-next{padding:14px 28px;background:var(--text);color:#f7f5f0;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;min-height:50px;}
.btn-next:hover{opacity:.82;}.btn-next:disabled{opacity:.25;cursor:default;}
.btn-back{display:flex;align-items:center;gap:6px;padding:14px 16px;background:var(--card);color:var(--text);border:2px solid #c8c4bc;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;min-height:50px;}
.btn-back:active{border-color:var(--brand);background:var(--brand-light);}

/* Breadcrumb */
.bc{display:flex;flex-wrap:wrap;align-items:center;margin-bottom:1.1rem;}
.edit-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.edit-chip{display:flex;align-items:center;gap:4px;font-size:11px;padding:5px 11px 5px 9px;border:1.5px solid #d0ccc4;border-radius:99px;color:var(--muted);background:var(--card);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.edit-chip:active{border-color:var(--brand);color:var(--brand-dark);background:var(--brand-light);}
.edit-chip-dot{width:4px;height:4px;border-radius:50%;background:var(--brand);flex-shrink:0;}

/* Results */
.results-meta{font-size:13px;color:var(--muted);margin-bottom:.9rem;line-height:1.65;}
.result-card{border:2px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;background:var(--card);}
.result-card.top{border-color:var(--brand);}
.rc-head{padding:14px 16px 9px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.rc-rank{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.rc-name{font-family:'DM Serif Display',serif;font-size:18px;margin:2px 0 2px;}
.rc-prog{font-size:12px;color:var(--brand);font-style:italic;margin-bottom:2px;}
.rc-country{font-size:12px;color:var(--muted);}
.rc-score{font-family:'DM Serif Display',serif;font-size:24px;color:var(--brand);text-align:right;}
.rc-score-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;text-align:right;}
.rc-body{padding:0 16px 12px;}
.rc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.rc-tag{font-size:12px;padding:3px 9px;border-radius:99px;border:1px solid var(--border);color:var(--muted);background:var(--bg);}
.rc-tag.good{border-color:#b8c8a8;color:var(--success);background:#f0f5ea;}
.rc-tag.warn{border-color:#e0c0a0;color:var(--danger);background:#fdf0e4;}
.rc-tag.info{border-color:#b8d4f0;color:#1858a0;background:#eef4fc;}
.rc-tag.sf{border-color:#c8a84055;color:#7a6010;background:#fdf8e4;}
.rc-tag.sm{border-color:#c8b89855;color:#5a4828;background:#fdf5ec;}
.rc-tag.wp{border-color:#d4b8f055;color:#5818a0;background:#f4eeff;}
.rc-tag.bar-extra{border-color:#b8d4b855;color:#2a6a2a;background:#eefaee;}
.bar-note-box{font-size:12px;color:#2a6a2a;background:#eefaee;border:1px solid #b8d4b8;border-radius:6px;padding:6px 10px;margin-bottom:8px;}
.rc-insight{font-size:13px;color:var(--muted);line-height:1.65;border-top:1px solid #f0ede6;padding-top:8px;margin-bottom:9px;}
.rc-fb{display:flex;align-items:center;gap:7px;border-top:1px solid #f0ede6;padding-top:8px;flex-wrap:wrap;}
.rc-fb-label{font-size:12px;color:var(--muted2);}
.thumb-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s;min-height:34px;}
.thumb-btn.up.active{border-color:#7c9a60;color:var(--success);background:#f0f5ea;}
.thumb-btn.down.active{border-color:#c09060;color:var(--danger);background:#fdf0e4;}
.flag-btn{background:none;border:none;cursor:pointer;font-size:12px;color:#c8c4bc;margin-left:auto;padding:6px 5px;font-family:'DM Sans',sans-serif;transition:color .15s;}
.flag-btn:active{color:var(--danger);}
.fp-field{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 12px;resize:none;outline:none;line-height:1.6;margin-bottom:7px;}
.fp-field:focus{border-color:var(--brand);}.fp-field::placeholder{color:#c8c4bc;}
.btn-flag-sub{padding:8px 15px;background:var(--text);color:#f7f5f0;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;min-height:36px;}
.btn-flag-can{padding:8px 13px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-left:5px;min-height:36px;}
.flag-sent-msg{font-size:13px;color:var(--success);}
.fb-panel{border:2px solid var(--border);border-radius:12px;padding:16px;margin-top:1.1rem;background:var(--card);}
.fp-title{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:3px;}
.fp-sub{font-size:13px;color:var(--muted);margin-bottom:.9rem;}
.fp-tabs{display:flex;gap:6px;margin-bottom:.9rem;flex-wrap:wrap;}
.fp-tab{font-size:12px;padding:5px 13px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;min-height:34px;}
.fp-tab.on{background:var(--brand-light);border-color:var(--brand);color:var(--brand-dark);font-weight:500;}
.fp-star-row{display:flex;gap:6px;margin-bottom:.9rem;}
.star{font-size:26px;cursor:pointer;color:var(--border);user-select:none;transition:color .1s;padding:2px;}
.star.on{color:#c8a840;}
.fp-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.fp-anon{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.fp-anon input{accent-color:var(--brand);cursor:pointer;width:16px;height:16px;}
.fp-sent{text-align:center;padding:1.5rem 0;}
.fp-sent-icon{font-size:34px;margin-bottom:8px;}
.fp-sent-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--success);margin-bottom:4px;}
.fp-sent-sub{font-size:13px;color:var(--muted);}

/* ── SHARE BUTTON ── */
.share-fab{position:fixed;bottom:20px;right:16px;z-index:100;display:flex;align-items:center;gap:7px;padding:12px 18px;background:var(--text);color:#f7f5f0;border:none;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.22);transition:transform .15s,opacity .15s;}
.share-fab:active{transform:scale(.96);}
.share-fab svg{flex-shrink:0;}

/* ── SHARE MODAL ── */
.share-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.share-overlay.on{display:flex;}
.share-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;}
.share-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px;}
.share-title{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:4px;}
.share-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
.share-btns{display:flex;flex-direction:column;gap:10px;}

.qr-close{padding:12px 28px;background:var(--text);color:#f7f5f0;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}

/* Copy toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1916;color:#f7f5f0;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:400;transition:transform .3s ease;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.fade{animation:fadeUp .28s ease both;}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.share-overlay.on .share-sheet{animation:slideUp .3s ease;}

function getShareURL(){return window.location.href.split('?')[0].split('#')[0]||'https://llm-compass.vercel.app';}

function openShare(){document.getElementById('shareOverlay').classList.add('on');if(navigator.share)document.getElementById('nativeShareBtn').style.display='flex';}
function closeShareModal(){document.getElementById('shareOverlay').classList.remove('on');}
function closeShare(e){if(e.target===document.getElementById('shareOverlay'))closeShareModal();}

function shareWeChat(){
  closeShareModal();
  const url=getShareURL();
  const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(url)+'&bgcolor=ffffff&color=1a1916&margin=10';
  document.getElementById('qrImgEl').src=qrUrl;
  document.getElementById('qrOverlay').classList.add('on');
}
function closeQR(e){if(!e||e.target===document.getElementById('qrOverlay'))document.getElementById('qrOverlay').classList.remove('on');}

function copyLink(){
  const url=getShareURL();
  const text='LLM Compass — 海外LLM项目智能匹配器（中国法学生专属）\n覆盖美英港新澳加34个顶尖项目\n'+url;
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>{showToast('✓ 链接已复制到剪贴板');closeShareModal();}).catch(()=>fallbackCopy(text));
  }else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('✓ 链接已复制到剪贴板');}catch(e){showToast('请手动复制链接');}
  document.body.removeChild(ta);closeShareModal();
}
function nativeShare(){
  if(!navigator.share)return;
  navigator.share({title:'LLM Compass — 海外LLM项目匹配器',text:'中国法学生海外LLM项目智能匹配工具，覆盖美英港新澳加34个顶尖项目',url:getShareURL()}).then(()=>closeShareModal()).catch(()=>{});

function buildTG(){
  const te=document.getElementById('ctabs'),pe=document.getElementById('cpanels');
  if(!te||!pe)return;
  te.innerHTML='';pe.innerHTML='';
  TC.forEach((c,ci)=>{
    const tab=document.createElement('button');
    tab.className='ctab'+(ci===0?' on':'');
    tab.textContent=c.flag+' '+c.label;
    tab.setAttribute('data-country',c.id);
    tab.onclick=function(){
      te.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));
      pe.querySelectorAll('.country-panel').forEach(p=>p.classList.remove('on'));
      this.classList.add('on');
      document.getElementById('cp-'+c.id).classList.add('on');
    };
    te.appendChild(tab);
    const panel=document.createElement('div');
    panel.className='country-panel'+(ci===0?' on':'');
    panel.id='cp-'+c.id;
    let ph=`<div style="font-size:12px;color:#b8b0a0;margin-bottom:8px">数据来源：${c.src}</div>`;
    c.tiers.forEach(t=>{
      ph+=`<div class="tier-card"><div class="tier-head"><span class="tier-badge ${t.b}">${t.l}</span><span class="tier-reach" style="margin-left:auto">${t.r}</span></div><div class="tier-schools">${t.s.map(s=>`<span class="stag">${s}</span>`).join('')}</div><div class="tier-note">${t.n}</div></div>`;

  });
}

/* ── WORK INSIGHT ── */
function getWorkInsight(){
  if(S.workStatus!=='working'||!S.workYears)return[];
  const yr=parseInt(S.workYears)||0;const ro=S.workRoles;const ind=S.workIndustries;const tips=[];
  const hasRole=id=>ro.includes(id);const hasInd=id=>ind.includes(id);
  if(hasRole('law_firm')&&hasInd('tech'))tips.push({n:'律所+科技背景：Stanford/Berkeley极受欢迎',s:['Stanford（偏好律所+科技）','Cornell Tech','Berkeley']});
  if(hasRole('inhouse')&&hasInd('tech'))tips.push({n:'企业法务+科技：Stanford/Cornell Tech加分',s:['Stanford','Cornell Tech','Berkeley（Tech/AI）']});
  if(hasRole('law_firm')&&yr>=2)tips.push({n:'2年+律所经验：顶级项目竞争力大幅提升',s:['Harvard','U Chicago','Stanford','Michigan']});
  else if(hasRole('law_firm'))tips.push({n:'律所经验：T6竞争力强',s:['Columbia','NYU','Georgetown']});
  if(hasInd('finance'))tips.push({n:'金融行业背景大加分',s:['Penn（沃顿Certificate）','LSE（金融监管）','Columbia（公司法）']});
  if(hasRole('inhouse')&&hasInd('finance'))tips.push({n:'企业法务+金融：商法名校青睐',s:['Penn（商法+沃顿）','Columbia','LSE']});
  if(hasRole('govt'))tips.push({n:'政府/司法背景：政策导向学校加分',s:['Georgetown（DC政策#1）','NYU（国际法/公益）','ANU（公法/外交）']});
  if(hasRole('academia'))tips.push({n:'学术背景：研究型+Yale竞争力显著',s:['Yale','Oxford','Cambridge','Harvard（学术申请）']});
  if(yr>=4&&!tips.length)tips.push({n:S.workYears+'年经验显著提升顶级项目竞争力',s:['Harvard','U Chicago','Stanford','Michigan']});
  return tips;
}

/* ── SCORING ── */
function wkScore(p){if(S.workStatus==='fresh')return 0;const yr=parseInt(S.workYears)||0;const pref=p.wp||0;if(pref===0)return 0;if(pref===1)return yr>=1?4:0;if(pref===2)return yr>=2?8:yr>=1?3:-4;if(pref===3)return yr>=2?12:yr>=1?2:-8;return 0;}
function indBonus(p){
  if(S.workStatus==='fresh')return 0;
  const ro=S.workRoles;const ind=S.workIndustries;let b=0;
  const hasRole=id=>ro.includes(id);const hasInd=id=>ind.includes(id);
  if(hasInd('finance')&&(p.sp.corp>=2||p.sp.fin>=2))b+=5;
  if(hasInd('tech')&&(p.sp.tech>=2||p.sp.ai>=2||p.sp.data>=2))b+=5;
  if(hasInd('consulting')&&(p.sp.corp>=2||p.sp.fin>=2))b+=3;
  if(hasRole('law_firm'))b+=3;
  if(hasRole('govt')&&p.name.includes('Georgetown'))b+=6;
  if(hasRole('govt')&&p.name.includes('ANU'))b+=5;
  if(hasRole('govt')&&p.name.includes('NYU'))b+=3;
  if(hasRole('law_firm')&&hasInd('tech')){if(p.name.includes('Stanford'))b+=8;if(p.name.includes('Cornell Tech')||p.name.includes('Berkeley'))b+=6;}
  if(hasRole('inhouse')&&hasInd('tech')){if(p.name.includes('Stanford'))b+=7;if(p.name.includes('Cornell Tech')||p.name.includes('Berkeley'))b+=5;}
  if((hasRole('law_firm')||hasRole('inhouse'))&&hasInd('finance')){if(p.name.includes('Penn')||p.name.includes('Columbia'))b+=5;if(p.name.includes('LSE'))b+=4;}
  if(hasRole('academia')){if(p.name.includes('Yale'))b+=10;if(p.name.includes('Oxford')||p.name.includes('Cambridge')||p.name.includes('Harvard'))b+=5;}
  return b;
}
function spScore(p,sid){if(!sid||sid==='gen')return 8;const s=p.sp[sid]||0;if(s===3)return 20;if(s===2)return 12;if(s===1)return 5;return -8;}
function spLabel(sc){if(sc===3)return{c:'sf',t:'⭐ 专项旗舰'};if(sc===2)return{c:'sm',t:'✦ 专项强校'};return null;}
function langOK(p){if(!S.langType||S.langScore===null||S.langType==='none')return true;const req=p.lang[S.langType];if(req===null)return false;if(req===undefined)return true;return S.langScore>=req;}
function langMsg(p){if(!S.langType||S.langScore===null||S.langType==='none')return null;const req=p.lang[S.langType];if(req===null)return'✗ '+S.langType.toUpperCase()+' 不被接受（仅TOEFL）';if(req===undefined)return null;if(S.langScore>=req)return'✓ '+S.langType.toUpperCase()+' '+fmtS(S.langScore,S.langType)+' 达线';return'✗ 需'+S.langType.toUpperCase()+' '+req+'（差'+(req-S.langScore).toFixed(1)+'）';}
function moeBonus(){const sch=SCHOOLS.find(s=>s.id===S.schoolId);if(!sch)return 0;const m=sch.moe;if(m==='A+'||m==='A')return 6;if(m==='A-')return 3;if(m==='B+'||m==='B')return 0;return -3;}
function computeResults(){const aR=S.regions.filter(r=>r!=='any');const tier=S.schoolTier||'t4';return P.map(p=>{let sc=0;if(p.g.includes(S.goal))sc+=24;if(S.goal==='bar'&&p.be&&!p.bd)sc+=10;if(p.cost<=S.budget*1.05)sc+=16;else if(p.cost<=S.budget*1.3)sc+=6;if(p.t.includes(tier))sc+=12;else if(tier==='t4'&&p.t.includes('t3'))sc+=5;if(aR.length===0||S.regions.includes('any')||p.reg.some(r=>aR.includes(r)))sc+=16;sc+=spScore(p,S.specialty);sc+=wkScore(p);sc+=indBonus(p);sc+=moeBonus();if(S.langType&&S.langScore!==null&&S.langType!=='none'){if(langOK(p))sc+=8;else sc-=20;}return{...p,score:sc};}).sort((a,b)=>b.score-a.score).filter(p=>p.score>0).slice(0,6);}

/* ── HELPERS ── */
function rL(v){if(v<=15)return'≤15万/年';if(v<=20)return'约20万/年';if(v<=25)return'约25万/年';if(v<=30)return'约30万/年';if(v<=35)return'约35万/年';if(v<=40)return'约40万/年';if(v<=50)return'约50万/年';if(v<=60)return'约60万/年';if(v<=70)return'约70万/年';if(v<=80)return'约80万/年';if(v<=100)return'约100万/年';return'120万+/年';}
function rU(v){return'≈ USD '+Math.round(v*0.137)+'K/yr';}
function rP(v){return Math.round((v-15)/105*100);}
function lCfg(){if(S.langType==='toefl')return{min:60,max:120,step:1,label:'TOEFL iBT',low:'60',high:'120'};return{min:4.0,max:9.0,step:0.5,label:'IELTS Academic',low:'4.0',high:'9.0'};}
function dLS(t){return t==='toefl'?100:7.0;}
function fmtS(v,t){return t==='ielts'?parseFloat(v).toFixed(1):Math.round(v);}
function sPct(v,t){return t==='toefl'?Math.round((v-60)/60*100):Math.round((v-4)/5*100);}
function wkSum(){if(!S.workStatus)return'—';if(S.workStatus==='fresh')return'应届';const y=S.workYears||'?';const rStr=S.workRoles.map(r=>roles.find(x=>x.id===r)?.l).filter(Boolean).join('/');const iStr=S.workIndustries.map(i=>industries.find(x=>x.id===i)?.l).filter(Boolean).join('/');return y+'年'+(rStr?'·'+rStr:'')+(iStr?'·'+iStr:'');}
function stSum(i){const sch=SCHOOLS.find(s=>s.id===S.schoolId);return[S.goal?goals.find(g=>g.id===S.goal)?.main.slice(0,14):'—',sch?sch.n+'('+sch.e+')'  :'—',rL(S.budget),S.regions.length?S.regions.map(r=>regionOpts.find(o=>o.id===r)?.l.split(' ')[0]).join(' '):'—',specs.find(s=>s.id===S.specialty)?.l||'—',wkSum(),S.langType?(S.langType==='none'?'未考试':S.langType.toUpperCase()+' '+(S.langScore||'?')):'—'][i]||'—';}
function bcH(){if(S.step===0)return'';let h='<div class="bc fade">';for(let i=0;i<STEPS;i++){const d=i<S.step,cu=i===S.step;const col=d?'#7c6f5a':cu?'#1a1916':'#c8c4bc';const fw=cu?'500':'400';const oc=d?'onclick="jTo('+i+')"':'';h+=`<button ${oc} style="background:none;border:none;font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:${col};font-weight:${fw};cursor:${d?'pointer':'default'};padding:2px 4px;border-radius:3px;">${d?stSum(i).slice(0,12):stepLabels[i]}</button>`;if(i<STEPS-1)h+=`<span style="font-size:9px;color:#c8c4bc;padding:0 1px">›</span>`;}return h+'</div>';}
function ecH(){return'<div class="edit-row fade">'+stepLabels.map((l,i)=>`<button class="edit-chip" onclick="jTo(${i})"><span class="edit-chip-dot"></span>${stSum(i).slice(0,14)}</button>`).join('')+'</div>';}
function leH(){if(!S.langType||S.langScore===null||S.langType==='none')return'';const rows=P.slice(0,7).map(p=>{const req=p.lang[S.langType];let cl,tx;if(req===null){cl='ew';tx='不接受此考试';}else if(req===undefined){cl='en';tx='未列出';}else if(S.langScore>=req){cl='eg';tx='✓(min '+req+')';}else{cl='ew';tx='✗需'+req;}return`<div class="elig-row"><span class="es">${p.name.slice(0,16)}</span><span class="${cl}">${tx}</span></div>`;}).join('');return`<div class="lang-elig"><div class="lang-elig-title">快速达线检查</div>${rows}</div>`;}

    if(S.workStatus==='working'){
      h+=`<div class="wsec" style="margin-top:12px"><span class="wlbl">总工作年限</span><div class="yrs-grid">${['1','2-3','4-5','6+'].map(y=>`<button class="yr-pill${S.workYears===y?' sel':''}" onclick="pW('workYears','${y}')">${y}年</button>`).join('')}</div></div>`;
      h+=`<div class="wsec" style="margin-top:12px"><span class="wlbl">职能经历 <span style="font-weight:400;color:#b8b0a0">（可多选）</span></span><div class="ind-grid">${roles.map(r=>`<button class="ind-pill${S.workRoles.includes(r.id)?' sel':''}" onclick="pW('workRoles','${r.id}')">${r.l}<br><span style="font-size:9px;color:#b8b0a0">${r.e}</span></button>`).join('')}</div></div>`;
      h+=`<div class="wsec" style="margin-top:12px"><span class="wlbl">所在行业 <span style="font-weight:400;color:#b8b0a0">（可多选）</span></span><div class="ind-grid">${industries.map(ind=>`<button class="ind-pill${S.workIndustries.includes(ind.id)?' sel':''}" onclick="pW('workIndustries','${ind.id}')">${ind.l}<br><span style="font-size:9px;color:#b8b0a0">${ind.e}</span></button>`).join('')}</div></div>`;
    }
    h+=`</div>`;
    if(wi.length){h+=`<div class="work-insight fade d2">`;wi.forEach(tip=>{h+=`<div class="wi-title">🎯 ${tip.n}</div><div style="margin-bottom:7px">${tip.s.map(s=>`<span class="ws-tag">${s}</span>`).join('')}</div>`;});h+=`</div>`;}
    const ok=S.workStatus==='fresh'||(S.workStatus==='working'&&S.workYears&&S.workRoles.length>0);
    h+=`<div class="nav fade d2"><button class="btn-back" onclick="bk()">${bkSVG} 上一步</button><button class="btn-next" ${!ok?'disabled':''} onclick="nx()">继续 →</button></div>`;
  }else if(S.step===6){
    const cfg=S.langType&&S.langType!=='none'?lCfg():null;const cur=S.langScore;
    h+=`<div class="step-num fade">Language · 语言成绩</div><div class="step-q fade d1">你的 <em>英语考试成绩</em>？</div><div class="step-hint fade d1">注意：哈佛法学院只接受TOEFL（最低100分，四项各≥25），不接受雅思。</div><div class="lang-wrap fade d1"><div class="lang-tabs"><button class="lang-tab${S.langType==='toefl'?' sel':''}" onclick="sL('toefl')">TOEFL iBT</button><button class="lang-tab${S.langType==='ielts'?' sel':''}" onclick="sL('ielts')">雅思 IELTS</button><button class="lang-tab${S.langType==='none'?' sel':''}" onclick="sL('none')">尚未考 / 跳过</button></div>`;
    if(cfg){h+=`<div style="font-size:10px;color:#9a9588;margin-bottom:5px">${cfg.label}</div><div class="score-val" id="sv">${fmtS(cur!==null?cur:dLS(S.langType),S.langType)}</div><input type="range" class="custom" id="ls" min="${cfg.min}" max="${cfg.max}" step="${cfg.step}" value="${cur!==null?cur:dLS(S.langType)}" style="--pct:${sPct(cur!==null?cur:dLS(S.langType),S.langType)}%" oninput="upL(this.value)"><div class="score-range-labels"><span>${cfg.low}</span><span>${cfg.high}</span></div>`;if(S.langType==='ielts')h+=`<div class="toefl-note">⚠️ 哈佛LLM不接受雅思，仅TOEFL≥100（四项各≥25）。如目标含哈佛，须参加TOEFL。</div>`;h+=leH();}else{h+=`<div style="font-size:11px;color:#9a9588;padding:5px 0">请选择考试类型，或跳过继续。</div>`;}
    h+=`</div><div class="nav fade d2"><button class="btn-back" onclick="bk()">${bkSVG} 上一步</button><button class="btn-next" ${!S.langType?'disabled':''} onclick="sR()">查看匹配结果 →</button></div>`;
  }else if(S.step===STEPS){
    const res=computeResults();const sch=SCHOOLS.find(s=>s.id===S.schoolId);const spTxt=specs.find(s=>s.id===S.specialty)?.l||'';const wkTxt=wkSum();
    if(res.length===0){
      h+=`<div class="fade"><div class="step-num">匹配结果</div><div class="step-q">暂无完全匹配</div><div class="step-hint">请调整筛选条件，例如放宽预算或地区范围。</div>${ecH()}</div><div class="nav fade"><button class="btn-back" onclick="rs()">${bkSVG} 重新开始</button></div>`;
    }else{
      const moeBg=m=>({'A+':'#1a1916','A':'#4a3e2e','A-':'#7c6f5a','B+':'#9a8870','B':'#b8b0a0','B及以下':'#c8c4bc'}[m]||'#c8c4bc');
      const moeLbl=sch?`<span style="display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:${moeBg(sch.moe)};color:#fff;margin-left:5px;vertical-align:middle">教育部 ${sch.moe}</span>`:'';
      h+=`<div class="fade"><div class="step-num">匹配结果 · Your Matches</div><div class="step-q" style="margin-bottom:5px">你的最佳 <em>LLM 项目</em></div><div class="results-meta">院校：<strong>${sch?sch.n:''}</strong>${moeLbl} · 方向：${spTxt} · 工作：${wkTxt}</div>${ecH()}</div>`;
      res.forEach((p,i)=>{
        const lm=langMsg(p);const lc=lm?(lm.startsWith('✓')?'info':'warn'):null;
        const spSc=S.specialty?p.sp[S.specialty]||0:0;const sl=spLabel(spSc);
        const isWP=S.workStatus==='working'&&p.wp>=2;const hasExtra=p.be&&!p.bd;
        h+=`<div class="result-card${i===0?' top':''} fade" style="animation-delay:${i*.07}s"><div class="rc-head"><div><div class="rc-rank">${i===0?'最佳匹配':'第'+(i+1)+'名'}</div><div class="rc-name">${p.name}</div><div class="rc-prog">${p.prog}</div><div class="rc-country">${p.c}</div></div><div><div class="rc-score">${p.score}</div><div class="rc-score-label">匹配分</div></div></div><div class="rc-body"><div class="rc-tags">${p.bd?`<span class="rc-tag good">Bar ✓</span>`:''} ${hasExtra?`<span class="rc-tag bar-extra">Bar* 加学分</span>`:''} ${p.jd?`<span class="rc-tag good">→JD</span>`:''}<span class="rc-tag">约${p.cost}万/年</span><span class="rc-tag good">声誉${p.pr}</span>${sl?`<span class="rc-tag ${sl.c}">${sl.t}</span>`:''} ${isWP?`<span class="rc-tag wp">偏好工作党</span>`:''} ${lm?`<span class="rc-tag ${lc}">${lm}</span>`:''}</div>${hasExtra&&p.bn?`<div class="bar-note-box">ℹ️ ${p.bn}</div>`:''}<div class="rc-insight">${p.ins}</div>${fbCardH(p.name)}</div></div>`;
      });
      h+=`<div class="nav fade" style="animation-delay:.4s"><button class="btn-back" onclick="rs()">${bkSVG} 重新开始</button></div>${fbPanelH()}`;
    }
  }
  el.innerHTML=h;
  // scroll to top on step change
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── ACTIONS ── */
function pick(k,v){S[k]=v;render();}
function pW(k,v){
  if(k==='workRoles'||k==='workIndustries'){const arr=S[k];const i=arr.indexOf(v);if(i>-1)arr.splice(i,1);else arr.push(v);render();return;}
  S[k]=v;if(k==='workStatus'&&v==='fresh'){S.workYears=null;S.workRoles=[];S.workIndustries=[];}render();
}
function pSch(id,t){S.schoolId=id;S.schoolTier=t;render();}
function sS(v){S.ss=v;render();}
function togR(id){if(id==='any'){S.regions=['any'];render();return;}S.regions=S.regions.filter(r=>r!=='any');const i=S.regions.indexOf(id);if(i>-1)S.regions.splice(i,1);else S.regions.push(id);render();}
function upB(v){S.budget=+v;const bv=document.getElementById('bv'),bu=document.getElementById('bu'),bs=document.getElementById('bs');if(bv)bv.textContent=rL(+v);if(bu)bu.textContent=rU(+v);if(bs)bs.style.setProperty('--pct',rP(+v)+'%');}
function sL(t){S.langType=t;if(t==='none'){S.langScore=null;}else if(S.langScore===null){S.langScore=dLS(t);}else{if(t==='ielts'&&S.langScore>9)S.langScore=dLS('ielts');if(t==='toefl'&&S.langScore<=9)S.langScore=dLS('toefl');}render();}
function upL(v){S.langScore=parseFloat(v);const sv=document.getElementById('sv'),ls=document.getElementById('ls');if(sv)sv.textContent=fmtS(+v,S.langType);if(ls)ls.style.setProperty('--pct',sPct(+v,S.langType)+'%');const eli=document.querySelector('.lang-elig');if(eli){const nh=leH();if(nh)eli.outerHTML=nh;}}
function nx(){S.step=Math.min(S.step+1,STEPS);render();}
function bk(){S.step=Math.max(0,S.step-1);render();}
function jTo(i){S.step=i;render();}
function sR(){S.step=STEPS;render();}
function rs(){S.step=0;S.goal=null;S.schoolId=null;S.schoolTier=null;S.budget=50;S.regions=[];S.specialty=null;S.workStatus=null;S.workYears=null;S.workRoles=[];S.workIndustries=[];S.langType=null;S.langScore=null;S.ss='';S.thumbs={};S.flagOpen={};S.flagSent={};S.flagText={};S.fpTab='overall';S.fpStars=0;S.fpHover=0;S.fpText='';S.fpSent=false;render();}
function setTh(id,v,name){S.thumbs[id]=v;sendFeedback({type:'卡片'+(v==='up'?'👍':'👎'),school:name,content:v==='up'?'用户点赞':'用户点踩',profile:getUserProfile()});render();}
function togFlag(id){S.flagOpen[id]=!S.flagOpen[id];render();}
function subFlag(id,name){const txt=S.flagText[id]||'';if(!txt.trim())return;sendFeedback({type:'⚑ 数据问题反馈',school:name,content:txt,profile:getUserProfile()});S.flagSent[id]=true;S.flagOpen[id]=false;render();}
function fpTab(t){S.fpTab=t;S.fpText='';render();}
function fpH(n){S.fpHover=n;document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<(n||S.fpStars)));}
function fpSt(n){S.fpStars=n;render();}
function fpSub(){if(!S.fpText.trim()&&S.fpStars===0)return;const tabLabel={overall:'整体体验',data:'数据准确性',missing:'缺少项目'}[S.fpTab]||S.fpTab;sendFeedback({type:'📝 '+tabLabel,school:'—',content:S.fpText,stars:S.fpStars||null,profile:getUserProfile()});S.fpSent=true;render();}

render();
</script>
</body>
